<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>SVG to PNG Converter with Font Support</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

	<style>
		@font-face {
			font-family: 'Chiller';
			src: url('Chiller.ttf') format('truetype');
		}
	</style>
</head>
<body>
	<h1>SVG to PNG Converter</h1>
	<p>Upload SVG files (can use <code>sans-serif</code> or <code>Chiller</code> fonts) change the scale for higher quality and convert them to PNGs.</p>

	<label for="scale">Scale:</label>
	<input type="range" id="scale" min="0.1" max="10" step="0.1" value="1">
	<span id="scaleValue">1</span>

	<br><br>

	<input type="checkbox" id="cropTransparency" checked=true>
	<label for="cropTransparency">Remove transparency and crop before zipping</label>

	<br><br>

	<input type="file" id="fileInput" multiple accept=".svg">
	<button id="convertButton">Convert and Download</button>

	<script type="module">
	import { Canvg } from 'https://cdn.skypack.dev/canvg';

	document.getElementById('scale').addEventListener('input', function () {
		document.getElementById('scaleValue').textContent = this.value;
	});

	function removeTransparencyAndCrop(canvas) {
		let ctx = canvas.getContext('2d');
		let width = canvas.width;
		let height = canvas.height;

		let imgData = ctx.getImageData(0, 0, width, height);
		let data = imgData.data;

		let top = height, left = width, right = -1, bottom = -1;

		for (let y = 0; y < height; y++) {
			for (let x = 0; x < width; x++) {
				let i = (y * width + x) * 4;
				if (data[i + 3] > 0) {
					if (x < left) left = x;
					if (x > right) right = x;
					if (y < top) top = y;
					if (y > bottom) bottom = y;
					data[i + 3] = 255;
				}
			}
		}

		if (right < left || bottom < top) {
			let emptyCanvas = document.createElement('canvas');
			emptyCanvas.width = 1;
			emptyCanvas.height = 1;
			return emptyCanvas;
		}

		ctx.putImageData(imgData, 0, 0);

		let cropWidth = right - left + 1;
		let cropHeight = bottom - top + 1;

		if (cropWidth <= 0 || cropHeight <= 0) {
			let fallback = document.createElement('canvas');
			fallback.width = 1;
			fallback.height = 1;
			return fallback;
		}

		let croppedCanvas = document.createElement('canvas');
		let croppedCtx = croppedCanvas.getContext('2d');
		croppedCanvas.width = cropWidth;
		croppedCanvas.height = cropHeight;

		croppedCtx.drawImage(
			canvas,
			left, top, cropWidth, cropHeight,
			0, 0, cropWidth, cropHeight
		);

		return croppedCanvas;
	}

	document.getElementById('convertButton').addEventListener('click', async () => {
		const files = document.getElementById('fileInput').files;
		const scale = parseFloat(document.getElementById('scale').value);
		const cropTransparency = document.getElementById('cropTransparency').checked;

		if (!files.length) {
			alert('Please upload at least one SVG file.');
			return;
		}

		const zip = new JSZip();

		for (const file of files) {
			if (!file.name.toLowerCase().endsWith('.svg')) continue;

			try {
				let svgText = await file.text();
				svgText = svgText.replace(/^\uFEFF/, '');

				const parser = new DOMParser();
				const parsed = parser.parseFromString(svgText, 'image/svg+xml');

				if (parsed.querySelector('parsererror')) {
					throw new Error('SVG is not well-formed XML.');
				}

				const canvas = document.createElement('canvas');
				const ctx = canvas.getContext('2d');

				const v = await Canvg.from(ctx, svgText, {
					ignoreDimensions: true,
				});

				let width = 512, height = 512;

let viewBox = v.document.documentElement.getAttribute('viewBox');

if (typeof viewBox === 'string') {
	const parts = viewBox.trim().split(/[\s,]+/).map(Number);

	if (parts.length === 4 && parts.every(n => !isNaN(n))) {
		width = parts[2];
		height = parts[3];
	}
} else {
	// fallback: try width/height attributes
	let wAttr = v.document.documentElement.getAttribute('width');
	let hAttr = v.document.documentElement.getAttribute('height');

	let w = parseFloat(wAttr);
	let h = parseFloat(hAttr);

	if (!isNaN(w) && !isNaN(h)) {
		width = w;
		height = h;
	}
}

				canvas.width = width * scale;
				canvas.height = height * scale;
				ctx.setTransform(scale, 0, 0, scale, 0, 0);

				await document.fonts.ready;
				await v.render();

				let finalCanvas = canvas;

				if (cropTransparency) {
					finalCanvas = removeTransparencyAndCrop(canvas);
				}

				await new Promise((resolve, reject) => {
					finalCanvas.toBlob(blob => {
						if (!blob) {
							reject(new Error('Failed to create PNG blob.'));
							return;
						}
						const pngName = file.name.replace(/\.svg$/i, '.png');
						zip.file(pngName, blob);
						resolve();
					}, 'image/png');
				});
			} catch (error) {
				console.error(`Failed on ${file.name}:`, error);
				alert(`Failed on ${file.name}\n\n${error.message}`);
			}
		}

		const content = await zip.generateAsync({ type: 'blob' });
		saveAs(content, 'converted_svgs.zip');
	});
</script>
</body>
</html>
